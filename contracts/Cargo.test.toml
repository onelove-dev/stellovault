# Test configuration for comprehensive testing infrastructure
# This file documents the testing setup and dependencies

[package]
name = "stellovault-contracts-tests"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core testing
soroban-sdk = { version = "22.0.0", features = ["testutils"] }
proptest = "1.4"

# Performance testing
criterion = "0.5"

# Security testing
arbitrary = { version = "1.3", features = ["derive"] }

# Utilities
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
