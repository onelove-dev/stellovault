name: CI

on:
  push:
    branches: [main, master, contract]
  pull_request:
    branches: [main, master, contract]

jobs:
  # ── TypeScript Server ──────────────────────────────────────────────────────
  server:
    name: Server Checks (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Checks (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ── Smart Contracts ────────────────────────────────────────────────────────
  contracts:
    name: Contract Checks (Rust/Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Build Contract (WASM)
        run: cargo build --target wasm32-unknown-unknown --release

      # ── Comprehensive Testing Infrastructure ────────────────────────────────
      - name: Run Unit Tests
        run: cargo test unit_ -- --nocapture

      - name: Run Integration Tests
        run: cargo test integration_ -- --nocapture

      - name: Run Property-Based Tests (proptest)
        run: cargo test property_ --features testutils -- --nocapture --test-threads=1

      - name: Run Security Tests
        run: cargo test security_ -- --nocapture

      - name: Run Attack Vector Tests
        run: cargo test attack_ -- --nocapture

      - name: Run Gas Optimization Tests
        run: cargo test gas_ -- --nocapture

      - name: Run Formal Verification Tests
        run: cargo test invariant_ -- --nocapture

      - name: Run Economic Simulation Tests
        run: cargo test economic_ -- --nocapture

      - name: Run Performance Tests
        run: cargo test performance_ -- --nocapture

      - name: Run All Tests
        run: cargo test -- --nocapture

      # ── Security Scanning ──────────────────────────────────────────────────
      - name: Security Audit (cargo-audit)
        run: |
          cargo install cargo-audit
          cargo audit

      - name: Check for Unsafe Code
        run: cargo clippy --all-targets -- -W unsafe-code

      # ── Code Coverage ──────────────────────────────────────────────────────
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate Coverage Report
        run: cargo tarpaulin --out Xml --timeout 300

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          flags: contracts
          fail_ci_if_error: false